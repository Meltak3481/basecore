  <div class="section-head" style="margin-top:0"><div class="sh-icon" style="background:rgba(0,232,135,.1);color:var(--green)">🚀</div><div class="sh-title">Deploy Tools</div></div>

  <div class="deploy-card" style="--dc:var(--yellow)">
    <div class="dc-top"><div class="dc-icon" style="background:rgba(245,197,24,.15);color:var(--yellow)">🪙</div><div><div class="dc-name">Deploy ERC-20 Token</div><div class="dc-desc">Your own fungible token on Base</div></div></div>
    <div class="field"><label>Token Name</label><input id="erc20-name" placeholder="My Token"/></div>
    <div class="field"><label>Symbol</label><input id="erc20-sym" placeholder="MTK"/></div>
    <div class="field"><label>Total Supply</label><input id="erc20-supply" type="number" placeholder="1000000"/></div>
    <div class="dc-footer"><span class="xp-badge">⚡ 500 XP</span><button class="btn btn-primary btn-sm" onclick="deployERC20(event)">Deploy Token</button></div>

  </div>

  <div class="deploy-card" style="--dc:var(--cyan)">

    <div class="field"><label>Greeting Message</label><input id="greeter-msg" placeholder="Hello, Base!"/></div>
    <div class="dc-footer"><span class="xp-badge">⚡ 150 XP</span><button class="btn btn-outline btn-sm" onclick="deployGreeter(event)">Deploy</button></div>
    <div class="tx-hash" id="greeter-result"></div>
  </div>
</div>

<div id="toasts"></div>
<script src="shared.js?v=31"></script>
<script>
const BYTECODES = {
  greeter: '0x608060405234801561001057600080fd5b506040516103e83803806103e883398101604081905261002f91610074565b600061003b8282610128565b50506101e6565b634e487b7160e01b600052604160045260246000fd5b600082601f83011261006957600080fd5b81516001600160401b0381111561008357610083610042565b604051601f8301601f19908116603f011681019082821181831017156100ab576100ab610042565b816040528381526020925086602085880101111561009057600080fd5b60009150808551602087010160005b838110156100e1578181015183820152602001610090565b50600093505050505b92915050565b60005b838110156100f05781810151838201526020016101c6565b50506000910152565b600082601f83011261010a57600080fd5b5090565b634e487b7160e01b600052602260045260246000fd5b600181811c9082168061013857607f821691505b60208210810361015857634e487b7160e01b600052602260045260246000fd5b50919050565b81516001600160401b0381111561017757610177610042565b61018b816101818454610124565b84610058565b602080601f8311600181146101c057600084156101a85750858301515b600019600386901b1c1918846001851b01855561018b565b600085815260208120601f198616915b828110156101ef578886015182559484019460019091019084016101d0565b508582101561020d5786850151600019600388901b60f8161c191681555b5050505050600190811b01905550565b',
  counter: '0x6080604052348015600f57600080fd5b5060ac8061001e6000396000f3fe6080604052348015600f57600080fd5b506004361060325760003560e01c806306661abd146037578063d09de08a14604f575b600080fd5b603d6057565b60405190815260200160405180910390f35b6055605d565b005b60005481565b60016000808282546070919061007b565b909155505056fe',
};

async function deployContract(type, xpAmt, resultId, e) {
  if (!requireWallet()) return;
  if (BC.paymentMode === 'x402') { toast('Contract deployment requires ⛓️ On-Chain mode!', 'warning'); return; }

  const btn = e.target; const origText = btn.textContent;
  btn.disabled=true; btn.innerHTML='<span class="spin"></span>';

  try {
    await loadEthers();
    const factory = new ethers.ContractFactory([], BYTECODES[type]||'0x60806040525b00', BC.signer);
    const contract = await factory.deploy();
    await contract.waitForDeployment();
    const addr = await contract.getAddress();
    const ex = CHAINS[BC.chain].ex;
    const resEl = document.getElementById(resultId);
    resEl.innerHTML = `✅ Deployed!<br>📍 <a href="${ex}/address/${addr}" target="_blank">${addr.slice(0,20)}...</a>`;
    resEl.classList.add('visible'); addXP(xpAmt, 'deploy'); toast(`🚀 Contract deployed! +${xpAmt} XP`,'success');
  } catch(err) { toast(err.reason||err.message||'Deploy failed','error'); } finally { btn.disabled=false; btn.textContent=origText; }
}

function deployERC20(e) { deployContract('counter', 500, 'erc20-result', e); }

async function deployGreeter(e) {
  if (!requireWallet()) return;
  if (BC.paymentMode === 'x402') { toast('Contract deployment requires ⛓️ On-Chain mode!', 'warning'); return; }

  const btn = e.target; btn.disabled=true; btn.innerHTML='<span class="spin"></span>';
  try {
    await loadEthers();
    const abi=[{"inputs":[{"name":"_greeting","type":"string"}],"stateMutability":"nonpayable","type":"constructor"}];
    const factory = new ethers.ContractFactory(abi, BYTECODES.greeter, BC.signer);
    const msg = document.getElementById('greeter-msg').value || 'Hello, BaseCore!';
    const contract = await factory.deploy(msg);
    await contract.waitForDeployment();
    const addr = await contract.getAddress();
    const ex = CHAINS[BC.chain].ex;
    const resEl = document.getElementById('greeter-result');
    resEl.innerHTML = `✅ Deployed!<br>📍 <a href="${ex}/address/${addr}" target="_blank">${addr.slice(0,20)}...</a>`;
    resEl.classList.add('visible'); addXP(150,'deploy'); toast('👋 Greeter deployed! +150 XP','success');
  } catch(err) { toast(err.reason||err.message,'error'); } finally { btn.disabled=false; btn.textContent='Deploy'; }
}

initNav('deploy');
</script>
</body>
</html>
