<style>
.machine-wrap{position:relative;margin-bottom:20px;}
.machine-body{
  background:linear-gradient(160deg,#1a0a3a,#0d1020,#1a0a3a);
  border:3px solid rgba(139,92,246,.5);border-radius:24px;
  padding:16px 16px 20px;
  box-shadow:0 0 50px rgba(139,92,246,.25),inset 0 0 40px rgba(0,0,0,.6);
  position:relative;overflow:visible;
}
.machine-top{text-align:center;margin-bottom:10px;}
.machine-name{font-size:13px;font-weight:900;letter-spacing:3px;color:rgba(167,139,250,.7);font-family:var(--mono);}
.neon-strip{height:3px;background:linear-gradient(90deg,transparent,#a855f7,#818cf8,#a855f7,transparent);margin-bottom:12px;animation:neon 2s ease-in-out infinite alternate;border-radius:2px;}
@keyframes neon{from{opacity:.4;box-shadow:none;}to{opacity:1;box-shadow:0 0 12px #a855f7;}}
.reels-window{
  background:rgba(0,0,0,.7);border:2px solid rgba(139,92,246,.35);
  border-radius:16px;padding:10px;margin-bottom:10px;
  box-shadow:inset 0 0 24px rgba(0,0,0,.9);
  position:relative;
}
/* Payline */
.reels-window::after{
  content:'';position:absolute;left:6px;right:6px;top:50%;height:2px;
  background:linear-gradient(90deg,transparent,rgba(245,197,24,.6),rgba(245,197,24,.9),rgba(245,197,24,.6),transparent);
  transform:translateY(-50%);pointer-events:none;border-radius:1px;
}
.reels{display:flex;gap:8px;justify-content:center;}
.reel{
  width:82px;height:100px;
  background:rgba(0,0,0,.8);border:1px solid rgba(139,92,246,.25);
  border-radius:10px;overflow:hidden;position:relative;
}
/* Top/bottom gradient вҖ” spinning effect */
.reel::before,.reel::after{
  content:'';position:absolute;left:0;right:0;height:30px;z-index:2;pointer-events:none;
}
.reel::before{top:0;background:linear-gradient(180deg,rgba(0,0,0,.8),transparent);}
.reel::after{bottom:0;background:linear-gradient(0deg,rgba(0,0,0,.8),transparent);}
.reel-inner{
  display:flex;flex-direction:column;
  transition:transform 0s;
  will-change:transform;
}
.reel-sym{
  width:82px;height:100px;
  display:flex;align-items:center;justify-content:center;
  font-size:42px;flex-shrink:0;
}
.machine-msg{
  text-align:center;font-family:var(--mono);font-size:14px;
  font-weight:800;min-height:24px;color:var(--yellow);margin-top:4px;
}
.machine-msg.jackpot{color:#fbbf24;animation:jackpot .35s ease infinite alternate;}
@keyframes jackpot{from{transform:scale(1);}to{transform:scale(1.1);text-shadow:0 0 20px #fbbf24;}}

/* Lever */
.lever-wrap{
  position:absolute;right:-22px;top:40px;
  display:flex;flex-direction:column;align-items:center;
  cursor:pointer;
}
.lever-pole{
  width:14px;height:80px;
  background:linear-gradient(180deg,#94a3b8,#475569);
  border-radius:7px;
  box-shadow:2px 2px 8px rgba(0,0,0,.5);
  position:relative;
  transform-origin:bottom center;
  transition:transform 0.15s ease;
}
.lever-knob{
  position:absolute;top:-16px;left:50%;transform:translateX(-50%);
  width:28px;height:28px;border-radius:50%;
  background:radial-gradient(circle at 35% 35%,#fca5a5,#ef4444);
  border:2px solid #b91c1c;
  box-shadow:0 0 14px rgba(239,68,68,.5);
}
.lever-base{
  width:24px;height:12px;
  background:linear-gradient(180deg,#64748b,#334155);
  border-radius:4px;margin-top:-2px;
  box-shadow:0 4px 8px rgba(0,0,0,.4);
}
.lever-wrap:hover .lever-pole{transform:translateX(-2px);}
.lever-pulled .lever-pole{animation:leverDown .35s cubic-bezier(.4,0,.2,1);}
@keyframes leverDown{0%{transform:rotate(0);}40%{transform:rotate(35deg);}100%{transform:rotate(0);};}

.slots-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px;}
</style>
</head>

<script src="shared.js"></script>
<script src="sfx.js"></script>
<script>
const SYMS    = ['рҹҚ’','рҹҚӢ','рҹҚҠ','рҹҚҮ','вӯҗ','7пёҸвғЈ','рҹ’Һ','рҹҚҖ'];
const WEIGHTS = [30,25,20,15,12,8,5,3];
let slSp=0,slW=0,slXP=0,spinning=false;

function wRand(w){let t=w.reduce((a,b)=>a+b,0),r=Math.random()*t;for(let i=0;i<w.length;i++){r-=w[i];if(r<=0)return i;}return w.length-1;}

function initReels(){
  for(let r=0;r<3;r++){
    const inner=document.getElementById('ri-'+r);
    inner.innerHTML='';
    for(let i=0;i<20;i++){
      const s=document.createElement('div');
      s.className='reel-sym';
      s.textContent=SYMS[~~(Math.random()*SYMS.length)];
      inner.appendChild(s);
    }
  }
}

function pullLever(){
  if(spinning)return;
  const lever=document.getElementById('lever');
  lever.classList.add('lever-pulled');
  SFX.play('slots');
  setTimeout(()=>{lever.classList.remove('lever-pulled');playSlots();},350);
}

async function spinReel(reelIdx, finalSym, duration){
  const inner = document.getElementById('ri-'+reelIdx);
  const reel  = inner.parentElement;
  const SYM_H = 100;

  // Reel'i sonsuz dГ¶ndГјr, sonra finalSym'e kilitle
  const totalSyms  = inner.children.length;
  inner.lastElementChild.textContent = finalSym;

  // HДұzlДұ scroll animasyonu
  let pos = 0;
  const startTime = performance.now();

  await new Promise(res => {
    function frame(now) {
      const elapsed = now - startTime;
      const t       = Math.min(elapsed / duration, 1);
      // Ease out: hДұzlДұ baЕҹla, yavaЕҹ bit
      const speed   = Math.max(0.5, (1 - Math.pow(t, 2)) * 18);
      pos += speed;
      if (pos >= SYM_H * totalSyms) pos -= SYM_H * (totalSyms - 1);
      inner.style.transform = `translateY(-${pos % (SYM_H * totalSyms)}px)`;

      if (t < 1) { requestAnimationFrame(frame); }
      else {
        // Son konuma kilitle вҖ” finalSym ortada
        inner.style.transform = `translateY(-${SYM_H * (totalSyms - 1)}px)`;
        res();
      }
    }
    requestAnimationFrame(frame);
  });
}

async function playSlots(){
  if(!requireWallet())return;
  if(spinning)return;
  const btn=document.getElementById('slots-play');
  btn.disabled=true;btn.innerHTML='<span class="spin"></span>';
  spinning=true;

  const rc=await sendTxWithFee('0.00002',100,'game');
  if(!rc){btn.disabled=false;btn.textContent='рҹҺ° Spin В· 0.00002 ETH';spinning=false;return;}

  const results=[SYMS[wRand(WEIGHTS)],SYMS[wRand(WEIGHTS)],SYMS[wRand(WEIGHTS)]];
  document.getElementById('slots-msg').textContent='';
  document.getElementById('slots-msg').className='machine-msg';

  SFX.play('slots');

  // Makaralar sДұrayla durur (1вҶ’2вҶ’3)
  await Promise.all([
    spinReel(0, results[0], 1600),
    spinReel(1, results[1], 2100),
    spinReel(2, results[2], 2600),
  ]);

  // Sesler вҖ” her makara durduДҹunda
  await sleep(100); SFX.play('tick');
  await sleep(500); SFX.play('tick');
  await sleep(500); SFX.play('tick');

  slSp++;
  const [s1,s2,s3]=results;
  let xpWon=0,msg='',isJackpot=false;

  if(s1===s2&&s2===s3){
    if(s1==='рҹ’Һ')     {xpWon=10000;msg='рҹ’Һ JACKPOT! 10,000 XP!';isJackpot=true;}
    else if(s1==='7пёҸвғЈ'){xpWon=5000;msg='7пёҸвғЈ TRIPLE 7! 5K XP!';}
    else if(s1==='вӯҗ'){xpWon=3000;msg='вӯҗ TRIPLE STAR! 3K!';}
    else              {xpWon=1000;msg=`${s1} TRIPLE! 1K XP`;}
    slW++;
  } else if(s1===s2||s2===s3||s1===s3){
    xpWon=300;msg='Pair! +300 XP';slW++;
  }

  const msgEl=document.getElementById('slots-msg');
  if(xpWon>0){
    slXP+=xpWon;addXP(xpWon,null);
    msgEl.textContent=msg;
    msgEl.className='machine-msg'+(isJackpot?' jackpot':'');
    if(isJackpot)SFX.play('bigwin');else SFX.play('win');
    showWin(xpWon+100,msg,isJackpot?'рҹ’Һ':'рҹҺ°');
  } else {
    msgEl.textContent=`${s1} ${s2} ${s3} вҖ” No match`;
    SFX.play('lose');
  }

  document.getElementById('sl-sp').textContent=slSp;
  document.getElementById('sl-w').textContent=slW;
  document.getElementById('sl-xp').textContent=fmtXP(slXP);

  // Reel'leri resetle
  initReels();
  spinning=false;
  btn.disabled=false;btn.textContent='рҹҺ° Spin В· 0.00002 ETH';
  recordGamePlayed();
}

function showWin(xp,title,emoji){
  document.getElementById('win-emoji').textContent=emoji||'рҹҺ°';
  document.getElementById('win-title').textContent=title;
  document.getElementById('win-xp').textContent='+'+xp.toLocaleString()+' XP';
  document.getElementById('win-card').className='win-card show';
  document.getElementById('lose-card').className='lose-card';
  document.getElementById('win-burst').className='win-burst show';
  document.getElementById('win-overlay').style.pointerEvents='all';
  spawnConfetti();
}
function showLose(msg,sub){
  document.getElementById('lose-title').textContent=msg;
  document.getElementById('lose-sub').textContent=sub;
  document.getElementById('lose-card').className='lose-card show';
  document.getElementById('win-card').className='win-card';
  document.getElementById('win-burst').className='win-burst';
  document.getElementById('win-overlay').style.pointerEvents='all';
}
function closeWin(){
  document.getElementById('win-card').className='win-card hide';
  document.getElementById('lose-card').className='lose-card hide';
  setTimeout(()=>{document.getElementById('win-overlay').style.pointerEvents='none';document.getElementById('win-card').className='win-card';document.getElementById('lose-card').className='lose-card';},300);
}
function spawnConfetti(){const cols=['#f5c518','#00e887','#0070f3','#ec4899','#8b5cf6'];for(let i=0;i<50;i++){const el=document.createElement('div');el.className='confetti-piece';el.style.cssText=`left:${Math.random()*100}%;background:${cols[~~(Math.random()*cols.length)]};--dur:${1.5+Math.random()}s;--delay:${Math.random()*.4}s;transform:rotate(${Math.random()*360}deg)`;document.body.appendChild(el);setTimeout(()=>el.remove(),2500);}}
function shareX(t){window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(t+' в¬Ў @BaseCoreFun #Base')}&url=${encodeURIComponent('https://basecore.fun')}`,'_blank');}

initNav('gaming');
initReels();
</script>
